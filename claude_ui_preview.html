<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>人生简历 · Claude 极简人文风 UI 预览</title>
  <style>
    /* CSS Reset */
    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    /* CSS Variables (Claude 极简风格配色体系) */
    :root {
      /* 背景色与主题色 */
      --bg-body: #FAF9F6;          /* 温暖的象牙白，减缓阅读疲劳 */
      --bg-card: #FFFFFF;          /* 纯白卡片，轻微阴影 */
      --bg-hover: #FFF8F5;         /* 极浅的暖橘色悬停态 */
      --theme-primary: #D97757;    /* 陶土橘强调色 (Claude 标志性色彩) */
      --border-color: #E5E1D8;     /* 极细的暖灰边框 */
      
      /* 文本色 */
      --text-main: #2D2D2D;        /* 主文本色：深灰/炭黑 */
      --text-muted: #767676;       /* 次要文本色：中性灰 */
      --text-light: #A0A0A0;       /* 更浅的文字，如底部注脚 */
      
      /* 属性条颜色 (低饱和度莫兰迪色系) */
      --color-conf: #6B8B9B;       /* 信心：灰蓝 */
      --color-stress: #B57B7B;     /* 压力：灰红 */
      --color-anx: #C29B6B;        /* 焦虑：灰黄 */
      --color-mor: #7D9E8C;        /* 心气：灰绿 */
      --color-effort: #D97757;     /* 努力：陶土橘 */
      --color-money: #8E99A8;      /* 余额：金属灰 */
      
      /* 字体排版 */
      --font-serif: "Georgia", "Noto Serif SC", "Songti SC", serif; /* 衬线体，营造文学感 */
      --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif; /* 无衬线体，用于UI件 */
    }

    body {
      background-color: var(--bg-body);
      color: var(--text-main);
      font-family: var(--font-sans);
      line-height: 1.65;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: flex-start; /* 改为顶部对齐，更符合长文阅读习惯 */
      padding: 40px 20px;
    }

    /* 游戏主容器，取消原有的深色粗边框，改为极简悬浮卡片 */
    .app-container {
      width: 100%;
      max-width: 680px; /* 稍微加宽一点，更像阅读器 */
      background: var(--bg-card);
      border-radius: 16px;
      box-shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
      border: 1px solid var(--border-color);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      position: relative;
      min-height: 85vh; /* 保证一定的高度 */
    }

    /* 顶部属性状态栏 (HUD) - 极简、无边框、扁平化 */
    .attr-hud {
      display: flex;
      flex-wrap: wrap;
      justify-content: space-between;
      padding: 24px 32px;
      border-bottom: 1px solid var(--border-color);
      background: var(--bg-card);
      gap: 16px;
    }
    .hud-item {
      flex: 1 1 calc(33.33% - 16px);
      min-width: 80px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }
    .hud-top-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      font-weight: 500;
    }
    .hud-name {
      color: var(--text-muted);
      letter-spacing: 0.5px;
    }
    .hud-val {
      color: var(--text-main);
      font-family: monospace; /* 数字使用等宽字体更清晰 */
    }
    /* 极细进度条 */
    .hud-track {
      width: 100%;
      height: 4px;
      background: #F0EDE5;
      border-radius: 2px;
      overflow: hidden;
    }
    .hud-fill {
      height: 100%;
      border-radius: 2px;
      transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    }
    /* 单个属性颜色 */
    .fill-conf { background: var(--color-conf); width: 65%; }
    .fill-stress { background: var(--color-stress); width: 85%; }
    .fill-anx { background: var(--color-anx); width: 45%; }
    .fill-mor { background: var(--color-mor); width: 30%; }
    .fill-effort { background: var(--color-effort); width: 90%; }
    .fill-money { background: var(--color-money); width: 50%; }

    /* 高危/优秀状态的文字颜色反馈（克制） */
    .hud-warn .hud-val { color: var(--color-stress); font-weight: 600; }
    .hud-ok .hud-val { color: var(--color-mor); }

    /* 主内容区 (Event Area) - 阅读器体验 */
    .game-content {
      flex: 1;
      padding: 40px 48px;
      display: flex;
      flex-direction: column;
      gap: 32px;
      overflow-y: auto;
    }

    /* 标签与标题 */
    .event-header {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .event-tag {
      align-self: flex-start;
      font-size: 12px;
      font-weight: 600;
      color: var(--theme-primary);
      text-transform: uppercase;
      letter-spacing: 1px;
      padding: 4px 10px;
      background: var(--bg-hover);
      border-radius: 4px;
    }
    .event-title {
      font-family: var(--font-serif);
      font-size: 28px;
      font-weight: 700;
      color: var(--text-main);
      line-height: 1.4;
    }
    
    /* 章节月份信息，像书签一样安静 */
    .chapter-info {
      font-size: 14px;
      color: var(--text-muted);
      border-left: 2px solid var(--border-color);
      padding-left: 12px;
      margin-bottom: -16px;
    }

    /* 剧情正文 - 衬线体，大字号，高行距，强沉浸感 */
    .event-desc {
      font-family: var(--font-serif);
      font-size: 17px;
      line-height: 1.8;
      color: var(--text-main);
      white-space: pre-wrap;
    }

    /* 选项区域 (Choices) - 大片留白，悬浮微交互 */
    .choices-wrap {
      margin-top: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    .choices-label {
      font-size: 13px;
      color: var(--text-muted);
      font-weight: 500;
      letter-spacing: 0.5px;
      margin-bottom: 4px;
    }
    .choice-btn {
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding: 20px 24px;
      background: var(--bg-card);
      border: 1px solid var(--border-color);
      border-radius: 12px;
      cursor: pointer;
      text-align: left;
      transition: all 0.25s ease;
      position: relative;
    }
    .choice-btn:hover {
      background: var(--bg-hover);
      border-color: var(--theme-primary);
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(217, 119, 87, 0.08);
    }
    .choice-text {
      font-size: 16px;
      font-weight: 500;
      color: var(--text-main);
      line-height: 1.5;
    }
    .choice-effect {
      font-size: 13px;
      color: var(--text-muted);
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }
    /* 选项中的数值变化标签，极其微弱的背景色 */
    .fx-tag {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 6px;
      border-radius: 4px;
      background: #F5F5F5;
    }
    .fx-pos { color: var(--color-mor); font-weight: 600; }
    .fx-neg { color: var(--color-stress); font-weight: 600; }
    
    /* Hover 时强调色反馈 */
    .choice-btn:hover .choice-text {
      color: var(--theme-primary);
    }

    /* 响应式调整 */
    @media (max-width: 600px) {
      body { padding: 0; align-items: stretch; }
      .app-container { border-radius: 0; border: none; min-height: 100vh; box-shadow: none; }
      .game-content { padding: 32px 24px; }
      .event-title { font-size: 24px; }
      .event-desc { font-size: 16px; }
      .attr-hud { padding: 20px 24px; gap: 12px; }
      .hud-item { flex: 1 1 calc(33.33% - 12px); }
    }
  </style>
</head>
<body>

  <div class="app-container">
    
    <!-- 极简属性面板 (HUD) -->
    <div class="attr-hud">
      <div class="hud-item">
        <div class="hud-top-row">
          <span class="hud-name">信心</span>
          <span class="hud-val">65</span>
        </div>
        <div class="hud-track"><div class="hud-fill fill-conf"></div></div>
      </div>
      <div class="hud-item hud-warn">
        <div class="hud-top-row">
          <span class="hud-name">压力</span>
          <span class="hud-val">85</span>
        </div>
        <div class="hud-track"><div class="hud-fill fill-stress"></div></div>
      </div>
      <div class="hud-item">
        <div class="hud-top-row">
          <span class="hud-name">焦虑</span>
          <span class="hud-val">45</span>
        </div>
        <div class="hud-track"><div class="hud-fill fill-anx"></div></div>
      </div>
      <div class="hud-item">
        <div class="hud-top-row">
          <span class="hud-name">心气</span>
          <span class="hud-val">30</span>
        </div>
        <div class="hud-track"><div class="hud-fill fill-mor"></div></div>
      </div>
      <div class="hud-item hud-ok">
        <div class="hud-top-row">
          <span class="hud-name">努力</span>
          <span class="hud-val">90</span>
        </div>
        <div class="hud-track"><div class="hud-fill fill-effort"></div></div>
      </div>
      <div class="hud-item">
        <div class="hud-top-row">
          <span class="hud-name">余额</span>
          <span class="hud-val">50</span>
        </div>
        <div class="hud-track"><div class="hud-fill fill-money"></div></div>
      </div>
    </div>

    <!-- 游戏内容区 -->
    <div class="game-content">
      
      <!-- 标题区域 -->
      <div class="event-header">
        <div class="chapter-info">10月 · 第3章</div>
        <span class="event-tag">治愈时刻</span>
        <h2 class="event-title">深夜的便利店</h2>
      </div>

      <!-- 正文（衬线体，阅读感） -->
      <div class="event-desc">投完今天的第30份简历，你下楼去便利店买水。

店员大叔递给你一瓶温热的咖啡，笑着说："这么晚还在忙啊，年轻人加油，这瓶送你啦。"

你握着温热的瓶子，夜风吹过来，感觉也没那么冷了。</div>

      <!-- 选项区域 -->
      <div class="choices-wrap">
        <div class="choices-label">你会怎么做？</div>
        
        <button class="choice-btn">
          <div class="choice-text">喝完咖啡，回去接着改简历</div>
          <div class="choice-effect">
            <span class="fx-tag">压力 <span class="fx-pos">-15</span></span>
            <span class="fx-tag">焦虑 <span class="fx-pos">-10</span></span>
            <span class="fx-tag">心气 <span class="fx-pos">+15</span></span>
            <span class="fx-tag">努力 <span class="fx-pos">+15</span></span>
          </div>
        </button>

        <button class="choice-btn">
          <div class="choice-text">发个朋友圈记录这小小的善意</div>
          <div class="choice-effect">
            <span class="fx-tag">压力 <span class="fx-pos">-20</span></span>
            <span class="fx-tag">心气 <span class="fx-pos">+20</span></span>
            <span class="fx-tag">信心 <span class="fx-pos">+5</span></span>
            <span class="fx-tag">努力 <span class="fx-pos">+5</span></span>
          </div>
        </button>
        
        <button class="choice-btn">
          <div class="choice-text">坐在长椅上发呆十分钟，享受放空的宁静</div>
          <div class="choice-effect">
            <span class="fx-tag">压力 <span class="fx-pos">-30</span></span>
            <span class="fx-tag">焦虑 <span class="fx-pos">-15</span></span>
            <span class="fx-tag">努力 <span class="fx-neg">-5</span></span>
          </div>
        </button>
      </div>

    </div>
  </div>

</body>
</html>
