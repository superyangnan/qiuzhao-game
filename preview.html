<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>人生简历 · 秋招模拟器</title>
<style>
:root {
  /* Claude 极简人文风格配色体系 */
  --bg: #FAF9F6;          /* 温暖的象牙白，减缓阅读疲劳 */
  --bg-card: #FFFFFF;     /* 纯白卡片 */
  --bg-card-hover: #FFF8F5; /* 极浅的暖橘色悬停态 */
  --bg-selected: #F0EDE5;  /* 选中的浅暖灰色 */
  
  /* 强调色与按钮 (Claude 标志性陶土橘) */
  --accent: #D97757;      /* 陶土橘强调色 */
  --accent-2: #B57B7B;    /* 次要强调色 */
  --accent-glow: rgba(217, 119, 87, 0.08);
  --accent-btn: linear-gradient(135deg, #D97757 0%, #E89070 100%);
  
  /* 文本色 */
  --text-1: #2D2D2D;      /* 主文本色：深灰/炭黑 */
  --text-2: #767676;      /* 次要文本色：中性灰 */
  --text-3: #A0A0A0;      /* 辅助文本色 */
  
  /* 莫兰迪属性条颜色 */
  --green: #7D9E8C;
  --red: #B57B7B;
  --amber: #C29B6B;
  --blue: #6B8B9B;
  --rose: #B57B7B;
  
  /* 边框与阴影 */
  --border: #E5E1D8;      /* 极细的暖灰边框 */
  --border-hover: #D97757;
  --border-selected: #D97757;
  
  --radius: 16px;
  --radius-sm: 10px;
  --shadow: 0 4px 24px rgba(0, 0, 0, 0.04);
  --shadow-card: 0 4px 32px rgba(0, 0, 0, 0.06);
  --transition: 0.25s cubic-bezier(0.4, 0, 0.2, 1);
  
  /* 字体排版 */
  --font-serif: "Georgia", "Noto Serif SC", "Songti SC", serif;
  --font-sans: "Inter", -apple-system, BlinkMacSystemFont, "PingFang SC", "Helvetica Neue", sans-serif;
}

*{box-sizing:border-box;margin:0;padding:0;-webkit-font-smoothing:antialiased}

body {
  background: var(--bg);
  color: var(--text-1);
  font-family: var(--font-sans);
  line-height: 1.65;
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: flex-start;
  padding: 40px 20px;
  overflow-x: hidden;
}

/* ── 环境光（禁用以符合极简风） ── */
.ambient { display: none; }

/* ── 页面容器 (模拟阅读器卡片) ── */
#app {
  width: 100%;
  max-width: 680px; /* 阅读器宽度 */
  background: var(--bg-card);
  border-radius: var(--radius);
  box-shadow: var(--shadow-card);
  border: 1px solid var(--border);
  overflow: hidden;
  display: flex;
  flex-direction: column;
  position: relative;
  min-height: 85vh;
  z-index: 1;
}

.page { display: none; }
.page.active { display: block; }

/* ── 页面过渡动画 ── */
@keyframes pageIn {
  from { opacity:0; transform:translateY(16px); }
  to   { opacity:1; transform:translateY(0); }
}
.fade-in { animation: pageIn 0.4s cubic-bezier(0.4,0,0.2,1) forwards; }

/* ─────────────────────────────────
   首页
───────────────────────────────── */
#page-index {
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  min-height: 80vh; padding: 60px 24px;
  text-align: center;
}

.index-badge {
  display: inline-flex; align-items: center; gap: 8px;
  background: transparent;
  border: 1px solid var(--border);
  border-radius: 100px; padding: 6px 16px;
  font-size: 12px; color: var(--text-2);
  font-weight: 500; letter-spacing: 1px;
  margin-bottom: 48px;
}
.badge-dot {
  width: 4px; height: 4px; border-radius: 50%;
  background: var(--accent);
}
@keyframes pulse-dot { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.8)} }

.index-title {
  font-family: var(--font-serif);
  font-size: clamp(48px, 10vw, 72px);
  font-weight: 700;
  letter-spacing: -1.5px;
  color: var(--text-1); /* 移除渐变，回归纯色 */
  margin-bottom: 16px;
}
.index-sub {
  font-size: 18px; color: var(--text-2); margin-bottom: 12px;
  font-weight: 400;
}
.index-desc {
  font-size: 15px; color: var(--text-3); line-height: 1.8;
  max-width: 440px; margin: 0 auto 56px;
}

.features-row {
  display: flex; gap: 10px; flex-wrap: wrap; justify-content: center;
  margin-bottom: 56px;
}
.feat-chip {
  background: transparent; border: 1px solid var(--border);
  border-radius: 8px; padding: 8px 14px;
  font-size: 13px; color: var(--text-2);
}
.feat-chip-icon { font-size: 16px; }

.btn-primary {
  display: inline-flex; align-items: center; gap: 10px;
  background: var(--text-1); /* 黑色/深灰按钮，极简特征 */
  border: none; border-radius: 12px;
  padding: 16px 48px; cursor: pointer;
  font-size: 16px; font-weight: 500; color: #fff;
  transition: opacity var(--transition);
  box-shadow: none; /* 移除阴影 */
  text-decoration: none; position: relative; overflow: hidden;
}
.btn-primary:hover { opacity: 0.9; transform: none; box-shadow:none;}
.btn-primary::after { display: none; }
.btn-primary:active { transform:scale(0.98); }
.btn-arrow { font-size: 18px; transition: transform var(--transition); }
.btn-primary:hover .btn-arrow { transform: translateX(4px); }

.index-disclaimer {
  margin-top: 32px; font-size: 12px; color: var(--text-3);
}

/* ─────────────────────────────────
   创建角色
───────────────────────────────── */
#page-create {
  max-width: 600px; margin: 0 auto;
  padding: 40px 24px 100px;
}

.create-header { text-align: center; margin-bottom: 40px; }
.create-step-label {
  font-size: 11px; color: var(--text-3); font-weight: 600;
  letter-spacing: 2px; margin-bottom: 8px; text-transform: uppercase;
  display: block;
}
.create-title { font-size: 28px; font-weight: 600; color: var(--text-1); letter-spacing: -0.5px; }
.create-hint { font-size: 14px; color: var(--text-3); margin-top: 8px; }

/* 进度条 */
.step-track {
  display: flex; gap: 4px; margin-bottom: 48px;
}
.step-seg {
  flex: 1; height: 2px; background: var(--border);
  border-radius: 0; position: relative; transition: background 0.3s;
  overflow: hidden;
}
.step-seg.done { background: var(--text-1); }
.step-seg.active::after {
  content:''; position:absolute; top:0; bottom:0; left:0; width:50%;
  background: var(--text-1); border-radius: 0;
  animation: load-seg 1s ease infinite alternate;
}
@keyframes load-seg { 0%{width:0%} 100%{width:100%} }

/* 选项列表 */
.opt-list { display: flex; flex-direction: column; gap: 10px; }
.opt-grid { display: grid; grid-template-columns: repeat(auto-fill,minmax(140px,1fr)); gap: 10px; }

.opt-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
  display: flex; align-items: center; gap: 16px;
  cursor: pointer; transition: all 0.2s;
  position: relative; overflow: hidden;
  box-shadow: none;
}
.opt-card::before { display: none; }
.opt-card:hover { border-color: var(--text-1); background: var(--bg-card); }
.opt-card.selected {
  background: var(--bg-card); border-color: var(--text-1);
  border-width: 1.5px;
}
.opt-card:active { transform: scale(0.99); }

.opt-icon-wrap {
  width: 36px; height: 36px; border-radius: 8px; flex-shrink: 0;
  background: var(--bg); border: none;
  display: flex; align-items: center; justify-content: center;
  font-size: 18px; color: var(--text-2); transition: all var(--transition);
}
.opt-card.selected .opt-icon-wrap { background: var(--text-1); color: #fff; }
.opt-body { flex: 1; min-width: 0; }
.opt-name { font-size: 15px; font-weight: 500; color: var(--text-1); margin-bottom: 4px; }
.opt-desc { font-size: 12px; color: var(--text-3); margin-top: 3px; line-height: 1.4; }
.opt-check {
  width: 18px; height: 18px; border-radius: 50%; flex-shrink: 0;
  border: 1.5px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s; background: transparent;
}
.opt-card.selected .opt-check {
  background: var(--text-1); border-color: var(--text-1);
}
.opt-check::after {
  content: ''; width: 8px; height: 4px;
  border-left: 2px solid #fff; border-bottom: 2px solid #fff;
  transform: rotate(-45deg) translate(1px, -1px);
  opacity: 0; transition: 0.2s;
}
.opt-card.selected .opt-check::after { opacity: 1; }

/* 网格卡片（专业选择） */
.opt-tile {
  border-radius: 12px; padding: 16px;
  background: var(--bg-card); border: 1px solid var(--border);
  text-align: center; cursor: pointer; transition: all 0.2s;
  display: flex; flex-direction: column; align-items: center; gap: 8px;
}
.opt-tile:hover { border-color: var(--text-1); background: var(--bg-card); transform: translateY(-2px); }
.opt-tile.selected { border-color: var(--text-1); background: var(--bg-card); border-width: 1.5px; }
.opt-tile:active { transform: scale(0.97); }
.opt-tile-icon { font-size: 24px; margin-bottom: 4px; opacity: 0.6; transition: 0.2s; }
.opt-tile.selected .opt-tile-icon { opacity: 1; transform: scale(1.1); }
.opt-tile-name { font-size: 13px; font-weight: 500; color: var(--text-1); line-height: 1.3; }

/* 底部固定按钮栏 */
.bottom-nav {
  position: absolute; bottom: 0; left: 0; right: 0; z-index: 10;
  padding: 16px 24px 28px;
  background: linear-gradient(to top, var(--bg) 60%, transparent);
  display: flex; gap: 12px; max-width: 680px; margin: 0 auto;
}
.bottom-nav-inner {
  position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
  width: 100%; max-width: 680px;
  padding: 12px 24px 28px;
  background: linear-gradient(to top, var(--bg) 55%, transparent);
  display: flex; gap: 12px;
}
.btn-back {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 12px; padding: 14px 20px;
  font-size: 14px; color: var(--text-2); cursor: pointer;
  transition: all var(--transition); white-space: nowrap;
}
.btn-back:hover { background:var(--bg-card-hover); border-color:var(--border-hover); color:var(--text-1); }
.btn-next {
  flex: 1; border-radius: 12px; padding: 14px;
  font-size: 15px; font-weight: 600; cursor: pointer;
  transition: all var(--transition); border: none;
}
.btn-next.enabled {
  background: var(--text-1);
  color: #fff;
  box-shadow: none;
}
.btn-next.enabled:hover { transform:translateY(-1px); opacity:0.9; }
.btn-next.enabled:active { transform:scale(0.99); }
.btn-next.disabled {
  background: rgba(255,255,255,0.05); color: var(--text-3); cursor: not-allowed;
}
.multi-hint {
  font-size: 12px; color: var(--text-3); margin-top: 10px;
  padding: 0 4px;
}

/* ─────────────────────────────────
   游戏页
───────────────────────────────── */
#page-game { min-height: 100vh; }

.game-layout {
  display: flex;
  flex-direction: column;
  height: 100%;
}

/* ── 顶部属性状态栏 (HUD) - Claude极简、无边框、扁平化 ── */
.attr-hud {
  display: flex;
  flex-wrap: wrap;
  justify-content: space-between;
  padding: 24px 32px;
  border-bottom: 1px solid var(--border);
  background: var(--bg-card);
  gap: 16px;
}
.hud-item {
  flex: 1 1 calc(33.33% - 16px);
  min-width: 80px;
  display: flex;
  flex-direction: column;
  gap: 6px;
}
.hud-top-row {
  display: flex;
  justify-content: space-between;
  align-items: center;
  font-size: 13px;
  font-weight: 500;
}
.hud-name {
  color: var(--text-2);
  letter-spacing: 0.5px;
}
.hud-val {
  color: var(--text-1);
  font-family: monospace; /* 数字使用等宽字体更清晰 */
}
/* 极细进度条 */
.hud-track {
  width: 100%;
  height: 4px;
  background: #F0EDE5;
  border-radius: 2px;
  overflow: hidden;
}
.hud-fill {
  height: 100%;
  border-radius: 2px;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}
/* 单个属性颜色 */
.hud-fill-conf   { background: var(--blue); }
.hud-fill-stress { background: var(--stress); }
.hud-fill-anx    { background: var(--amber); }
.hud-fill-mor    { background: var(--green); }
.hud-fill-effort { background: var(--accent); }
.hud-fill-money  { background: #8E99A8; }

/* 高危/优秀状态的文字颜色反馈（克制） */
.hud-warn .hud-val { color: var(--accent-2); font-weight: 600; }
.hud-ok .hud-val { color: var(--green); }

@media (max-width: 600px) {
  .attr-hud { padding: 20px 24px; gap: 12px; }
  .hud-item { flex: 1 1 calc(33.33% - 12px); }
}

/* 主内容区 (Event Area) - 阅读器体验 */
.game-main { 
  grid-column: 1; 
  padding: 40px 48px;
  display: flex;
  flex-direction: column;
  gap: 32px;
  overflow-y: auto;
}

/* 顶栏简化（像书签一样安静） */
.game-topbar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 0 0 16px 0;
  border-bottom: 2px solid var(--border);
  margin-bottom: 0;
}
.game-chapter { display: flex; align-items: center; gap: 12px; }
.chapter-pill {
  font-size: 14px; color: var(--text-2);
  padding-left: 12px; border-left: 2px solid var(--border);
  margin-bottom: -16px; font-weight: normal;
}
.chapter-title-text { font-size: 15px; font-weight: 500; color: var(--text-1); }

/* 进度点简化 */
.progress-dots { display: flex; gap: 5px; align-items: center; }
.pdot { width: 5px; height: 5px; border-radius: 50%; background: #E5E1D8; transition: all 0.3s; }
.pdot.done { background: var(--accent-2); }
.pdot.cur { background: var(--accent); width:14px; border-radius:3px; }

/* 事件卡片（去除厚重边框，融入背景） */
.event-card {
  background: transparent; border: none;
  border-radius: 0; padding: 0;
  margin-bottom: 0; box-shadow: none;
  display: flex; flex-direction: column; gap: 12px;
}
.event-cat-badge {
  align-self: flex-start; font-size: 12px; font-weight: 600;
  color: var(--accent); text-transform: uppercase; letter-spacing: 1px;
  padding: 4px 10px; background: var(--bg-card-hover);
  border-radius: 4px; border: none; margin-bottom: 0;
}
.event-title-text {
  font-family: var(--font-serif); font-size: 28px; font-weight: 700;
  color: var(--text-1); line-height: 1.4; margin-bottom: 12px;
}
.event-desc-text {
  font-family: var(--font-serif); font-size: 17px;
  line-height: 1.8; color: var(--text-1); white-space: pre-wrap;
}
.cursor { display:inline-block; color:var(--text-2); font-weight: 300; animation:cur-blink 0.8s step-end infinite; margin-left: 2px;}
@keyframes cur-blink { 0%,100%{opacity:1}50%{opacity:0} }

/* 选项区域 (Choices) - 大片留白，悬浮微交互 */
.choices-wrap { 
  margin-top: 20px; display: flex; flex-direction: column; gap: 16px;
  animation: pageIn 0.35s ease;
}
.choices-label {
  font-size: 13px; color: var(--text-2); font-weight: 500;
  letter-spacing: 0.5px; margin-bottom: 4px; display: block;
}
.choice-btn {
  display: flex; flex-direction: column; gap: 8px;
  padding: 20px 24px; background: var(--bg-card);
  border: 1px solid var(--border); border-radius: 12px;
  cursor: pointer; text-align: left; transition: all 0.25s ease;
  position: relative; width: 100%;
}
.choice-btn:hover {
  background: var(--bg-card-hover); border-color: var(--accent);
  transform: translateY(-2px); box-shadow: 0 4px 12px rgba(217, 119, 87, 0.08);
}
.choice-btn.selected {
  background: var(--bg-card-hover); border-color: var(--accent);
}
.choice-btn.dimmed { opacity: 0.35; pointer-events: none; }
.choice-btn:active { transform:scale(0.99); }
.choice-num { display: none; /* 隐藏编号圆圈，极简 */ }
.choice-body { flex:1; width: 100%; }
.choice-text { 
  font-size: 16px; font-weight: 500; color: var(--text-1); line-height: 1.5; 
  transition: color 0.2s;
}
.choice-btn:hover .choice-text { color: var(--accent); }
.choice-effects {
  font-size: 13px; color: var(--text-2);
  display:flex; flex-wrap:wrap; gap:12px; margin-top:8px;
}
.fx-tag {
  display: inline-flex; align-items: center; gap: 4px;
  padding: 2px 6px; border-radius: 4px; background: #F5F5F5;
  transition: all 0.2s ease; font-size: 13px;
}
.fx-pos { color: var(--green); font-weight: 600; background: transparent; border: none; }
.fx-neg { color: var(--red); font-weight: 600; background: transparent; border: none; }

/* 侧边属性栏（保留兼容类名） */
.game-sidebar { display: none; }
.attr-fill { height: 100%; border-radius: 2px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1); }
.fill-conf { background: var(--blue); }
.fill-stress { background: var(--stress); }
.fill-anx { background: var(--amber); }
.fill-mor { background: var(--green); }
.fill-money { background: #8E99A8; }

.attr-divider { height: 1px; background: var(--border); margin: 16px 0; }

.critical-msg {
  font-size: 12px; color: var(--accent-2); font-weight: 500;
  padding: 10px 12px; background: rgba(196,152,152,0.07);
  border: 1px solid rgba(196,152,152,0.15); border-radius: 10px;
  margin-top: 14px; line-height: 1.5;
}

/* 章节过渡全屏 */
.chapter-overlay {
  position: fixed; inset:0; z-index:100;
  background: var(--bg); display:flex; flex-direction:column;
  align-items:center; justify-content:center; gap:16px;
  animation: chapterAnim 2.5s cubic-bezier(0.4, 0, 0.2, 1) forwards;
  pointer-events: none;
}
@keyframes chapterAnim {
  0%   { opacity: 0; transform: translateY(12px); }
  15%  { opacity: 1; transform: translateY(0); }
  85%  { opacity: 1; transform: translateY(0); }
  100% { opacity: 0; transform: translateY(-12px); }
}
.ch-label { font-size:13px; color:var(--text-3); letter-spacing:4px; text-transform:uppercase; margin-bottom: 8px;}
.ch-title { font-size:40px; font-weight:700; font-family:var(--font-serif); color:var(--text-1); letter-spacing:-0.5px;}
.ch-line { display: none; }

@media (max-width: 600px) {
  .game-main { padding: 32px 24px; }
  .event-title-text { font-size: 24px; }
  .event-desc-text { font-size: 16px; }
  #page-create { padding: 40px 16px 100px; }
}
.attr-toggle-btn { display: none; }
.mobile-attr-panel { display: none; }

/* ─────────────────────────────────
   结局页 (重构：画廊风格)
───────────────────────────────── */
#page-ending { background: var(--bg); min-height: 100vh; }
.ending-wrap {
  max-width: 680px; margin: 0 auto; padding: 40px 24px 80px;
}

.ending-hero {
  background: var(--bg-card) !important; /* 强制背景为白 */
  border: 1px solid var(--border);
  border-radius: 16px; padding: 48px 24px;
  margin-bottom: 24px; text-align: center;
}
.ending-hero::before { display: none; }

.ending-hero-content { position: relative; z-index: 1; }
.ending-rarity-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--bg); color: var(--text-2);
  border: 1px solid var(--border);
  border-radius: 100px; padding: 5px 14px;
  font-size: 11px; font-weight: 600; letter-spacing: 1px;
  margin-bottom: 20px;
}
.ending-main-title {
  font-family: var(--font-serif);
  font-size: clamp(32px,5vw,48px); font-weight: 700;
  color: var(--text-1) !important; line-height: 1.2; letter-spacing: -1px;
  margin-bottom: 12px;
}
.ending-main-sub {
  font-size: 15px; color: var(--text-2) !important;
  line-height: 1.6; max-width: 400px; margin: 0 auto 32px;
}
.ending-stats {
  display: flex; justify-content: center; gap: 24px;
  border-top: 1px solid var(--border); padding-top: 24px;
}
.stat-item {
  background: transparent; border: none; padding: 0; width: auto;
  text-align: center;
}
.stat-val { font-size: 20px; font-weight: 600; color: var(--text-1); font-family: var(--font-sans); display:block; }
.stat-key { font-size: 11px; color: var(--text-3); margin-top:2px; display:block; }

.story-card {
  background: var(--bg-card); border: 1px solid var(--border);
  border-radius: 16px; padding: 32px; box-shadow: none;
  margin-bottom: 20px;
}
.story-body {
  font-family: var(--font-serif);
  font-size: 16px; color: var(--text-1);
  line-height: 1.9; white-space: pre-wrap;
}
.gold-quote {
  margin-top: 28px; padding-top: 24px;
  border-top: 1px dashed var(--border);
  font-family: var(--font-sans);
  font-size: 15px; color: var(--text-2);
  font-weight: 500; line-height: 1.8; text-align: center;
}

.replay-card {

const ENDING_STORIES = {
  A1:`你走进了秋招这场考场，那段奋战到深夜的时间如今想起来仍历历在目。\n\n顶级offer躺在邮箱里。数字是真实的，工牌是真实的，第一天上班时那种轻微的不真实感，也是真实的。\n\n站在这个位置上，会有一点孤独。你在人群里，却不一定找得到能分享这份感受的人。那没关系。\n\n真正的赢不是别人看你的眼神，是你知道自己为什么在这里。`,
  A2:`你面对的不是没有offer，而是两个都不想放弃的offer。\n\n其实做这个选择本身，就已经是一种答案了。你在秋招里跑赢了很多人，这不是偶然——是你那些不被看见的努力堆出来的。\n\n不管你最终选了哪个，都不会是错的。`,
  B1:`不是顶流的大厂，不是让朋友圈惊叫的名字，但这份offer，是你实实在在打出来的。\n\n最难的时候你没有放弃，低谷的时候你也挺过来了。这一路不算光鲜，但每一步都是你自己走的。\n\n这份工作，会是你的起点。什么时候出发，完全由你决定。`,
  B2:`你最终选择了回家。\n\n这个决定，可能有人不理解，可能你自己偶尔也会问一句"要不要再拼一把"。\n\n但那条街你从小走过，那些人说的话里有你熟悉的口音。慢一点，不是落后。离家近，不是失败。`,
  B3:`你考上了。\n\n备考的那段时间，你放弃了很多，刷了无数真题，背了无数框架。很多人说考公没意思，但你知道自己为什么选这条路。\n\n铁饭碗里装的不一定是安逸，有时候是一种叫做"确定性"的东西——在这个时代，确定性本身就很贵。`,
  C1:`这一年的秋招，你没有拿到满意的结果。\n\n说没关系是假的，你也不需要假装没关系。压力最大的那段时间，那是真实存在过的感受。\n\n但你选择了再来一次。这不是因为你不服气，而是因为你还没准备好放弃。失败是真实的，但它不是终点。`,
  C2:`当初填报志愿，你大概没想到今天会做这份工作。跨专业求职，每投一次简历都需要多解释一段自己的逻辑。\n\n但你撑下来了，而且在这个过程中，你比很多人更清楚自己到底想要什么。`,
  C3:`拿到这份offer的时候，你可能有点不甘心。薪资不如预期，公司不是心仪的那个。\n\n但你没有放弃，你选择先站到地上，再想办法往高处走。跳台不是终点，而是你起跳的地方。`,
  C4:`他们说你的学历进不了这种公司。\n\n你投了，过了，面了，拿了。\n\n这条路上你比别人多绕了多少圈，多被刷了多少次简历，你心里比任何人都清楚。但你到了。`,
  D1:`你没有在这个秋天找到工作，但你做了一个也许更难的决定：先停下来。\n\n不是逃跑，是暂停。给自己一段时间，在全力冲刺之前，先弄清楚自己要跑向哪里。去听听你自己的声音吧。`,
  D2:`你没有去投递别人的招聘简历，你选择了另一条路。凌晨三点还亮着的屏幕，是那种不知道何时是头的不确定感。\n\n但也有一种东西，是在别处找不到的：那是属于你的事。`,
  E1:`你崩溃过。不是轻描淡写的"有点累"，而是真实地撑不住了。\n\n那种时候，很多人选择假装自己还好。你也可能假装过。但你还是撑下来了，一天一天地，走到了今天。\n\n拿到这个offer的你，和刚开始秋招的你，已经不是同一个人了。`,
  E2:`这个秋天，你没有拿到offer。\n\n但有一件事值得你记住：你经历了整个秋招，所有的笔试、拒信、面试、沉默——你全部经历了，而且你完整地走出来了。这一年，你没有在最难的地方倒下。这不是小事。真的不是。`,
  E3:`你的秋招，不是一个激烈的故事。没有戏剧性的逆转，也没有彻底的低谷。就是一步一步地走，一封一封地等，一次一次地继续。\n\n能平静地经历一件本来很焦虑的事情，是一种了不起的能力。`,
  E4:`秋招结束了，你的路还没有结束。你还在找。这不是什么丢人的事，这只是你的节奏比别人慢了一点——而"慢"，不是"错"。\n\n走慢一点没关系，迷路了可以问路，累了可以停一停。但别停太久——你值得找到那个地方。`,
  X1:`那段时间，你的身体先于你做出了判断。\n\n某一天，你坐在椅子上什么也做不了。胸腔里有什么东西在一点点压下来，脑子里是所有还没回音的公司、还没做完的题，以及那个模糊的、越来越近的毕业。\n\n医生说是焦虑症合并睡眠障碍。你说，是的，我知道。\n\n住院的那些天，没有简历，没有笔试，没有已读不回的HR。你第一次在这场秋招里睡了一个完整的觉。\n\n出院那天，秋招已经结束了。你拿着出院证明站在医院门口，阳光出乎意料地好。\n\n你告诉自己：先活着，再谈工作。这个顺序，很重要。`,
  X2:`offer没了，你却觉得轻了一点。\n\n这个决定没有人支持。爸妈打来电话，朋友说你太任性，秋招群里有人说"你这是逃跑"。\n\n你把手机关掉，买了一张不知道去哪儿的车票。\n\n后来你在某个陌生的地方，对着傍晚的天空，突然想明白了一件事：原来这个世界上不是只有offer和简历的。\n\n这段旅途花了多少钱，你不想算。值不值得，你觉得不是用钱衡量的那种事。\n\n等你准备好了，你会回来的。那时候你会带着别人没有的东西回来。`,
  X3:`你不是不想努力。\n\n你努力过，投过几百份简历，做过几十套笔试，被拒了一遍又一遍。某一天，你意识到自己已经三天没有打开招聘软件了。\n\n不是不想投，是不知道还能投什么了。\n\n你把电脑关上，把APP删掉，给自己泡了杯茶，坐在窗边晒了两个小时太阳。你没有崩溃，你只是停下来了。\n\n先躺一段时间也没关系。躺平不是放弃，是你的一种权利。等你想重新出发的那天，路还在那里。而那时候的你，可能比现在想得更清楚。`,
  X4:`你没想到拦住你的不是HR，而是答辩委员会。\n\n论文被退回来的那天，外面正在下雨。你坐在办公室里，盯着导师发来的修改意见，看了很久，没有说话。\n\n同学们已经陆续开始上班了，有人发了入职打卡，有人在群里说"终于上岸了"。你收到一条消息："怎么还没毕业啊你？"\n\n你没有回。\n\n明年还有机会的。今年你学到了很多——关于研究，关于坚持，关于"有时候努力不够用，但方向可以调整"。\n\n这一年不是白费的。等你真的站上那个答辩台，你会知道这一年在哪里。`,
  O2:`拿到offer的那天，你坐在那里，表情很奇怪。\n\n不是很开心——这家公司不是你想去的，薪资低了一档，城市也不是最理想的那个。但你还是点了确认。\n\n有时候"先落地"是一种选择，而不是妥协。你知道这份工作不是终点，而是一个起点——一个不够完美，但真实存在的起点。\n\n你给自己定了一个期限：两年，认真做，积累经验，然后再看下一步。\n\n所有人都说"先上岸"。现在你上了。接下来怎么走，由你来定。`,
}

function getInitialAttributes(player) {
  let c=50,s=20,a=15,m=60,money=50,e=0
  const tier = player.schoolTier
  if(tier==='A'){c+=10;s+=8}
  if(tier==='B'){c+=5}
  if(tier==='D'){c-=10;m+=5}
  if(player.edu==='phd'){a+=10}
  if(player.edu==='master_985'){c+=5;s+=5}
  if(player.backgrounds.includes('big_tech_intern')){c+=15;e+=5}
  if(player.backgrounds.includes('financial_pressure')){money-=20;a+=10;e+=3}
  if(player.backgrounds.includes('cross_major')){c-=10;a+=5;e+=5}
  if(player.backgrounds.includes('family_connections')){money+=10}
  if(player.backgrounds.includes('competition_award')){c+=8;e+=8}
  const cl=v=>Math.min(100,Math.max(0,v))
  return {confidence:cl(c),stress:cl(s),anxiety:cl(a),morale:cl(m),money:cl(money),effort:cl(e)}
}

function matchesCond(cond,state) {
  if(!cond) return true
  const p=state.player
  const {chapter,attributes,flags}=state
  const {confidence,stress,anxiety,morale,effort}=attributes
  if(cond.minChapter!==undefined&&chapter<cond.minChapter)return false
  if(cond.maxChapter!==undefined&&chapter>cond.maxChapter)return false
  if(cond.majors?.length&&!cond.majors.includes(p.major))return false
  if(cond.eduLevels?.length&&!cond.eduLevels.includes(p.edu))return false
  if(cond.schoolTiers?.length&&!cond.schoolTiers.includes(p.schoolTier))return false
  // 多求职目标：任意一个匹配即可
  if(cond.jobTargets?.length&&!cond.jobTargets.some(t=>p.jobTargets.includes(t)))return false
  if(cond.backgrounds?.length&&!cond.backgrounds.some(b=>p.backgrounds.includes(b)))return false
  if(cond.minConfidence!==undefined&&confidence<cond.minConfidence)return false
  if(cond.maxConfidence!==undefined&&confidence>cond.maxConfidence)return false
  if(cond.minStress!==undefined&&stress<cond.minStress)return false
  if(cond.maxStress!==undefined&&stress>cond.maxStress)return false
  if(cond.minAnxiety!==undefined&&anxiety<cond.minAnxiety)return false
  if(cond.minMorale!==undefined&&morale<cond.minMorale)return false
  if(cond.minEffort!==undefined&&effort<cond.minEffort)return false
  if(cond.flags?.length&&!cond.flags.every(f=>flags.has(f)))return false
  if(cond.notFlags?.length&&cond.notFlags.some(f=>flags.has(f)))return false
  return true
}

function drawConditional(state,count) {
  const elig=CONDITIONAL_EVENTS.filter(e=>{
    if(e.isOneShot&&state.triggeredEventIds.has(e.id))return false
    return matchesCond(e.triggerCondition,state)
  })
  const res=[],used=new Set()
  for(let i=0;i<count;i++){
    const av=elig.filter(e=>!used.has(e.id))
    if(!av.length)break
    const tot=av.reduce((s,e)=>s+(e.weight||1),0)
    let r=Math.random()*tot
    for(const e of av){r-=(e.weight||1);if(r<=0){res.push(e);used.add(e.id);break}}
  }
  return res
}

function buildChapter(state) {
  const fixed=FIXED_EVENTS.filter(e=>e.chapter===state.chapter&&!(e.isOneShot&&state.triggeredEventIds.has(e.id)))
  const cond=drawConditional(state,state.chapter===3?2:1)
  const q=[],f=[...fixed],c=[...cond]
  while(f.length||c.length){
    if(f.length)q.push(f.shift())
    if(c.length)q.push(c.shift())
  }
  return q
}

function applyFx(attrs,fx){
  const r={...attrs}
  for(const[k,v]of Object.entries(fx||{}))if(r[k]!==undefined)r[k]=Math.min(100,Math.max(0,r[k]+v))
  return r
}

function determineEnding(state){
  const{attributes:at,flags:fl,player:p}=state

  // ── 极端崩溃优先（最高优先级）──
  if(at.stress >= 95 && at.anxiety >= 92 && at.morale < 18) return 'X1'   // 住进医院

  // ── Flag 硬覆盖 ──
  if(fl.has('startup_path'))                          return 'D2'
  if(fl.has('spring_recruitment_ongoing'))            return 'E4'
  if(fl.has('thesis_failed'))                         return 'X4'          // 论文没过
  if(fl.has('gave_up_qiuzhao') || fl.has('given_up')){
    if(at.morale >= 72 && at.stress < 32)             return 'X2'          // 环游世界
    if(at.morale > 50)                                return 'D1'          // Gap Year
    if(at.morale < 15)                                return 'X3'          // 彻底躺平
    return 'E2'
  }
  if(fl.has('civil_exam_entered') && at.morale > 40) return 'B3'

  // ── 属性计算 ──
  const highConf  = at.confidence >= 68
  const lowStress = at.stress < 58
  const highMoral = at.morale >= 58
  const highEffort = at.effort >= 75                   // 新增：高努力值判定
  const collapsed = at.stress >= 82 && at.anxiety >= 78
  const burnout   = at.stress >= 76 && at.morale < 32
  const calm      = at.stress < 45  && at.anxiety < 45
  // 新增：天道酬勤，高努力值增加上岸机会
  const hasOffer  = fl.has('offer_accepted') || fl.has('first_offer_accepted')
                 || (highConf && at.morale >= 55 && at.stress < 65)
                 || (at.effort >= 70 && at.morale >= 40) 
  const unhappyOffer = hasOffer && at.morale < 38 && at.stress > 62

  // ── 二次崩溃条件 ──
  if(at.stress >= 90 && at.anxiety >= 85)             return 'X1'

  // ── 努力值顶级结局判定（高优先级） ──
  if(highEffort && highMoral && !collapsed)           return 'A1' // 极高努力值且心气尚存，直接获得好结局

  // ── 彻底躺平 ──
  if(at.morale < 8 && !hasOffer)                      return 'X3'

  // ── 说走就走（高心气 + 低压力 + 无offer） ──
  if(at.morale >= 80 && at.stress < 28 && !hasOffer && !fl.has('civil_exam_entered')) return 'X2'

  if(collapsed)                                       return 'E1'
  if(burnout && !hasOffer)                            return 'E2'

  // ── 委屈上岸 ──
  if(unhappyOffer)                                    return 'O2'

  if(fl.has('chosen_hometown') && highConf)           return 'B2'
  if(highConf && lowStress && highMoral)              return hasOffer ? 'A1' : 'B1'
  if(fl.has('has_offer_keep_going') && hasOffer && highConf) return 'A2'
  if(fl.has('cross_major') && hasOffer)               return 'C2'
  if(fl.has('college_reverse') && hasOffer)           return 'C4'
  if(highConf && !lowStress && hasOffer)              return 'C3'
  if(at.morale >= 50 && at.stress < 68)              return hasOffer ? 'B1' : 'C1'
  if(calm && !hasOffer)                               return 'E3'
  if(hasOffer)                                        return 'C3'
  if(at.morale < 35)                                  return 'E2'
  return 'E3'
}

function getCritical(at){
  if(at.stress>=85&&at.anxiety>=75)return'⚠️ 你感到快撑不住了……'
  if(at.morale<20)return'😮‍💨 你开始觉得躺平也没什么不好……'
  if(at.money<15)return'💸 钱包见底了，压力又多了一层'
  if(at.stress>=82)return'🔥 你感到一种孤注一掷的冲动'
  if(at.stress<28&&at.anxiety<28)return'😌 你保持着一种奇特的平静'
  return null
}

    college:'2022—2025',bachelor_normal:'2021—2025',bachelor_211:'2021—2025',
    bachelor_985:'2021—2025',master_normal:'2022—2025',master_211:'2022—2025',

  const gpa = {A:'3.85/4.0',B:'3.65/4.0',C:'3.30/4.0',D:'3.02/4.0'}[player.schoolTier] || '3.30/4.0'

  const skillsMap = {
    cs:['Python / Java / C++','MySQL · Redis · Linux','Git · 数据结构与算法'],
    electronics:['Verilog / C / MATLAB','嵌入式系统 · PCB设计','信号处理 · 通信原理'],
    civil:['AutoCAD / Revit / PKPM','建筑规范 · 施工管理','结构力学 · 工程造价'],
    biology:['PCR · Western Blot · HPLC','Python数据处理 / R统计','生物信息学 · 文献检索'],
    math:['Python / R / MATLAB','统计建模 · 机器学习','数学建模 · 数值计算'],
    finance:['Excel/VBA · Wind · Bloomberg','金融建模 · 财务分析','CFA备考中 · DCF估值'],
    accounting:['Excel · 用友 · SAP','财务报表分析 · 税务','四大准则 · 审计流程'],
    business:['Excel · PPT · Python基础','市场分析 · 用户调研','项目管理 · 品牌营销'],
    trade:['英语六级600+ / 小语种','国际贸易实务 · 外贸函电','SAP · 报关流程'],
    law:['法律检索 · 合同起草','商事纠纷 · 公司法务','法律英语 · 模拟仲裁经历'],
    chinese:['内容创作 · 公众号运营','新闻采写 · 文案策划','Adobe全家桶基础'],
    history:['文献研究 · 田野调查','数字人文 / GIS基础','学术写作 · 档案整理'],
    foreign_lang:['英语口译/笔译（二级）','第二外语 · 跨文化交际','同传基础 · 商务英语'],
    medicine:['临床技能 · 病历书写','医学影像判读基础','SPSS统计 · 医学文献'],
    nursing:['护理操作规范 · 急救技能','病房管理 · 患者沟通','护理文书 · 医疗质控'],
  }
  const skills = skillsMap[player.major] || ['专业技能','计算机办公软件','团队协作']

  const expItems = []
  if(player.backgrounds.includes('big_tech_intern'))
    expItems.push({title:'互联网大厂实习',role:'产品/技术实习生',detail:'参与核心产品功能迭代，独立负责某模块开发，日均UV 10万+'})
  if(player.backgrounds.includes('research_paper'))
    expItems.push({title:'学术科研经历',role:'参与者/第一作者',detail:'发表/参与SCI或核心期刊论文，研究方向与目标岗位高度契合'})
  if(player.backgrounds.includes('startup'))
    expItems.push({title:'创业/副业项目',role:'联合创始人·核心成员',detail:'从0到1构建产品，获天使轮融资意向/用户数破千，主导产品与运营'})
  if(player.backgrounds.includes('student_leader'))
    expItems.push({title:'学生会/社团',role:'主席·负责人',detail:'统筹30+人团队，组织大型校级活动，获"优秀学生干部"称号'})
  if(player.backgrounds.includes('competition_award'))
    expItems.push({title:'专业竞赛获奖',role:'队长·核心队员',detail:'全国/省级专业竞赛一等奖，代表学校参赛，方案获企业导师好评'})
  if(player.backgrounds.includes('cross_major'))
    expItems.push({title:'跨专业修读',role:'辅修·自学',detail:`在${lb.major}基础上系统修读${lb.jobs}相关课程，完成认证，具备双向思维`})
  if(player.backgrounds.includes('family_connections'))
    expItems.push({title:'资源背景',role:'人脉积累',detail:'家庭具备一定行业资源，可获得内推渠道（不体现在简历上）'})

  // 评分计算
  let score = {A:82,B:70,C:56,D:42}[player.schoolTier] || 56
  const bonusMap = {big_tech_intern:15,research_paper:12,startup:10,competition_award:8,student_leader:6,family_connections:4,cross_major:-5,financial_pressure:0}
  for(const bg of player.backgrounds) score += bonusMap[bg]||0
  score = Math.min(97, Math.max(18, score))

  const scoreNote = score>=85?'竞争力强劲，大厂/头部单位值得一冲':
    score>=70?'综合背景扎实，有一战之力，精投为主':
    score>=55?'平均水平，多投多试，抓住每次面试机会':
    score>=40?'背景偏弱，重点包装亮点，走差异化路线':
    '逆风局——但逆风局里也出过最传奇的故事'

  const tierLabel = {A:'S级·顶校',B:'A级·重点',C:'B级·普本',D:'C级·专科'}[player.schoolTier]||'B级'

  return { lb, schoolName, eduYear, gpa, skills, expItems, score, scoreNote, tierLabel }
}

function renderAttrHud(at, crit){
  const items=[
    {k:'confidence', lbl:'信心', cls:'hud-fill-conf',  warn: at.confidence<30,  ok: at.confidence>=70},
    {k:'stress',     lbl:'压力', cls:'hud-fill-stress', warn: at.stress>75,       ok: at.stress<30},
    {k:'anxiety',    lbl:'焦虑', cls:'hud-fill-anx',   warn: at.anxiety>75,      ok: at.anxiety<25},
    {k:'morale',     lbl:'心气', cls:'hud-fill-mor',   warn: at.morale<25,       ok: at.morale>=70},
    {k:'effort',     lbl:'努力', cls:'hud-fill-effort',warn: false,              ok: at.effort>=70},
    {k:'money',      lbl:'余额', cls:'hud-fill-money', warn: at.money<20,        ok: at.money>=70},
  ]
  const chips=items.map(b=>`
    <div class="hud-item ${b.warn?'hud-warn':b.ok?'hud-ok':''}">
      <div class="hud-top-row">
        <span class="hud-name">${b.lbl}</span>
        <span class="hud-val">${at[b.k]}</span>
      </div>
      <div class="hud-track"><div class="hud-fill ${b.cls}" style="width:${at[b.k]}%"></div></div>
    </div>`).join('')
  return`<div class="attr-hud">${chips}${crit?`<div class="critical-msg" style="flex-basis:100%;margin-top:0">${crit}</div>`:''}</div>`
}

function renderAttrItems(at){
  return[
    {k:'confidence',lbl:'信心',cls:'fill-conf'},
    {k:'stress',    lbl:'压力',cls:'fill-stress'},
    {k:'anxiety',   lbl:'焦虑',cls:'fill-anx'},
    {k:'morale',    lbl:'心气',cls:'fill-mor'},
    {k:'effort',    lbl:'努力',cls:'fill-effort'},
    {k:'money',     lbl:'余额',cls:'fill-money'},
  ].map(b=>`<div class="attr-row">
    <div class="attr-label-row"><span class="attr-name">${b.lbl}</span><span class="attr-value">${at[b.k]}</span></div>
    <div class="attr-track"><div class="attr-fill ${b.cls}" style="width:${at[b.k]}%"></div></div>
  </div>`).join('')
}

function renderChoices(ev){
  const LABELS={confidence:'信心',stress:'压力',anxiety:'焦虑',morale:'心气',money:'余额',effort:'努力'}
  return`<div class="choices-wrap">
    <span class="choices-label">你会怎么做</span>
    ${ev.options.map((opt,i)=>{
      const sel=G.selectedIdx===i
      const dim=G.selectedIdx!==null&&G.selectedIdx!==i
      const tags=Object.entries(opt.effect||{}).filter(([,v])=>v!==0).map(([k,v])=>`<span class="fx-tag">${LABELS[k]||k} <span class="${v>0?'fx-pos':'fx-neg'}">${v>0?'+':''}${v}</span></span>`).join('')
      return`<button class="choice-btn ${sel?'selected':''} ${dim?'dimmed':''}" data-a="choose" data-i="${i}">
        <div class="choice-num">${String.fromCharCode(65+i)}</div>
        <div class="choice-body">
          <div class="choice-text">${esc(opt.text)}</div>
          ${tags?`<div class="choice-effects">${tags}</div>`:''}
        </div>
      </button>`
    }).join('')}
  </div>`
}

    localStorage.setItem('qiuzhao_uid', uid)

}

// 在调用方舟API时带上用户ID
const USER_ID = getOrCreateUserId()

async function callArk(systemPrompt, userPrompt, opts = {}) {
  try {
    const controller = new AbortController()
    const tid = setTimeout(() => controller.abort(), opts.timeout ?? 9000)
    const resp = await fetch('/api/ark', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json',
        'X-User-Id': USER_ID // 发送给后端的请求头，用于追踪和限流
      },
      body: JSON.stringify({
        model: ARK_MODEL,
        user: USER_ID, // OpenAI/Ark 规范的user参数
        messages: [
          { role: 'system', content: systemPrompt },
          { role: 'user',   content: userPrompt   },
        ],
        temperature: opts.temperature ?? 0.85,
        max_tokens:  opts.maxTokens  ?? 500,
      }),
      signal: controller.signal,
    })
    clearTimeout(tid)
    if (!resp.ok) { console.warn('[Ark] HTTP', resp.status); return null }
    const data = await resp.json()
    return data.choices?.[0]?.message?.content?.trim() ?? null
  } catch (e) {
    if (e.name !== 'AbortError') console.warn('[Ark]', e.message)
    return null
  }
}

    if (!startTime) startTime = ts
    const elapsed = ts - startTime - startDelay
    if (elapsed < 0) { requestAnimationFrame(tickCounter); return }
    const progress = Math.min(elapsed / duration, 1)
    const value = Math.round(easeOutExpo(progress) * target)
    if (numEl) numEl.textContent = value
    if (progress < 1) requestAnimationFrame(tickCounter)
    else if (numEl) numEl.textContent = target
  }

    if (!jsonStr.trim().endsWith('}')) {

// Canvas 分享卡片
// ═══════════════════════════════════════════════

function parseGradColors(gradStr) {
  return (gradStr.match(/#[a-f0-9]{6}/gi) || ['#7a8aae','#8a9abe'])
}

function canvasRoundRect(ctx, x, y, w, h, r) {
  ctx.beginPath()
  ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y)
  ctx.quadraticCurveTo(x+w,y,x+w,y+r)
  ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h)
  ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r)
  ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y)
  ctx.closePath()
}

function canvasWrapText(ctx, text, cx, startY, maxW, lineH) {
  const chars = [...text]; let line = ''; let y = startY
  for (let i = 0; i < chars.length; i++) {
    const test = line + chars[i]
    if (ctx.measureText(test).width > maxW && line) {
      ctx.fillText(line, cx, y); line = chars[i]; y += lineH
    } else { line = test }
  }
  if (line) ctx.fillText(line, cx, y)
  return y + lineH
}

function buildShareCanvas() {
  const ed  = ENDINGS_DATA[G.ending] || ENDINGS_DATA.E3
  const at  = G.state?.attributes || {}
  const lb  = getPlayerLabels(G.player)
  const quote = G._aiEndingResult?.quote || ed.quote
  const rarityLabel = {rare:'⭐ 稀有结局',secret:'🔮 隐藏结局',uncommon:'✨ 不常见',common:'普通结局'}

  const W = 750, H = 1280
  const canvas = document.createElement('canvas')
  canvas.width = W; canvas.height = H
  const ctx = canvas.getContext('2d')
  const font = (size, weight='normal') => `${weight} ${size}px -apple-system,"PingFang SC","Helvetica Neue",sans-serif`

  // 背景渐变
  const cols = parseGradColors(ed.grad)
  const bg = ctx.createLinearGradient(0, 0, W, H)
  bg.addColorStop(0, cols[0]); bg.addColorStop(1, cols[1])
  ctx.fillStyle = bg; ctx.fillRect(0, 0, W, H)
  // 暗层
  ctx.fillStyle = 'rgba(0,0,0,0.38)'; ctx.fillRect(0, 0, W, H)
  // 顶部噪点纹理感（细线）
  ctx.strokeStyle='rgba(255,255,255,0.04)'; ctx.lineWidth=1
  for(let y=0;y<H;y+=6){ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(W,y);ctx.stroke()}

  ctx.textAlign = 'center'

  // 顶部品牌
  ctx.fillStyle = 'rgba(255,255,255,0.5)'; ctx.font = font(26)
  ctx.fillText('人生简历 · 秋招模拟器', W/2, 70)

  // 稀有度徽章
  const rl = rarityLabel[ed.rarity] || '结局'
  ctx.fillStyle = 'rgba(255,255,255,0.15)'
  canvasRoundRect(ctx, W/2-90, 96, 180, 44, 22); ctx.fill()
  ctx.fillStyle = 'rgba(255,255,255,0.85)'; ctx.font = font(22)
  ctx.fillText(rl, W/2, 124)

  // 主标题
  ctx.fillStyle = '#fff'; ctx.font = font(78, 'bold')
  ctx.fillText(ed.title, W/2, 250)

  // 副标题
  ctx.fillStyle = 'rgba(255,255,255,0.72)'; ctx.font = font(30)
  canvasWrapText(ctx, ed.sub, W/2, 305, 620, 46)

  // 属性方块
  const stats = [['信心',at.confidence||'--'],['压力',at.stress||'--'],['焦虑',at.anxiety||'--'],['心气',at.morale||'--']]
  stats.forEach(([k,v],i)=>{
    const col = i%2, row = Math.floor(i/2)
    const bx = 100 + col*310, by = 430 + row*140
    ctx.fillStyle='rgba(255,255,255,0.13)'
    canvasRoundRect(ctx,bx-100,by-55,200,110,16); ctx.fill()
    ctx.fillStyle='#fff'; ctx.font=font(52,'bold')
    ctx.fillText(v, bx, by+2)
    ctx.fillStyle='rgba(255,255,255,0.55)'; ctx.font=font(24)
    ctx.fillText(k, bx, by+40)
  })

  // 分隔线
  ctx.strokeStyle='rgba(255,255,255,0.18)'; ctx.lineWidth=1
  ctx.beginPath(); ctx.moveTo(80,790); ctx.lineTo(W-80,790); ctx.stroke()

  // 金句
  ctx.fillStyle='rgba(255,255,255,0.92)'; ctx.font=`italic ${font(32)}`
  canvasWrapText(ctx, `"${quote}"`, W/2, 845, 570, 52)

  // 分隔线2
  ctx.strokeStyle='rgba(255,255,255,0.12)'; ctx.lineWidth=1
  ctx.beginPath(); ctx.moveTo(80,1040); ctx.lineTo(W-80,1040); ctx.stroke()

  // 玩家信息
  ctx.fillStyle='rgba(255,255,255,0.48)'; ctx.font=font(24)
  ctx.fillText(`${lb.edu} · ${lb.major}`, W/2, 1080)
  ctx.fillStyle='rgba(255,255,255,0.30)'; ctx.font=font(22)
  ctx.fillText(`目标：${lb.jobs}  |  ${lb.cities}`, W/2, 1115)

  // 底部
  ctx.fillStyle='rgba(255,255,255,0.28)'; ctx.font=font(20)
  ctx.fillText('2024届秋招模拟器 · 人生简历', W/2, 1210)

  return canvas
}

async function openShareModal() {
  const ed = ENDINGS_DATA[G.ending] || ENDINGS_DATA.E3
  const canvas = buildShareCanvas()
  const img = canvas.toDataURL('image/png')
  const quote = G._aiEndingResult?.quote || ed.quote

  const modal = document.createElement('div')
  modal.id = 'share-modal'
  modal.innerHTML = `
    <div class="share-modal-card">
      <div class="share-modal-title">🎴 你的秋招结局卡片</div>
      <img id="share-canvas-preview" src="${img}" alt="结局卡片">
      <div class="share-btn-row">
        <button class="share-action-btn share-btn-primary" id="share-dl">💾 保存图片</button>
        <button class="share-action-btn share-btn-secondary" id="share-cp">📤 分享文字</button>
      </div>
      <button class="share-close-btn" id="share-close">关闭</button>
    </div>
  `
  document.body.appendChild(modal)

  document.getElementById('share-dl').onclick = () => {
    const a = document.createElement('a')
    a.download = `秋招结局-${ed.title}.png`; a.href = img; a.click()
  }
  document.getElementById('share-cp').onclick = () => {
    const text = `我的秋招结局：${ed.title}\n\n"${quote}"\n\n— 人生简历·秋招模拟器`
    if (navigator.share) {
      navigator.share({ title: `我的秋招结局：${ed.title}`, text, url: location.href }).catch(()=>{})
    } else {
      navigator.clipboard?.writeText(text).then(() => {
        document.getElementById('share-cp').textContent = '✓ 已复制'
        setTimeout(() => { const el = document.getElementById('share-cp'); if(el) el.textContent = '📤 分享文字' }, 2000)
      })
    }
  }
  document.getElementById('share-close').onclick = () => modal.remove()
  modal.addEventListener('click', e => { if (e.target === modal) modal.remove() })
}

// ═══════════════════════════════════════════════
// 事件绑定
// ═══════════════════════════════════════════════

function bind(){
  document.querySelectorAll('[data-a]').forEach(el=>{
    el.addEventListener('click',onAction)
  })
  const card=document.getElementById('event-card')
  if(card) card.addEventListener('click',skipType)
}

function onAction(e){
  const el=e.currentTarget||e.target.closest('[data-a]')
  if(!el) return
  const a=el.dataset.a, v=el.dataset.v, i=el.dataset.i

  if(a==='setEdu'){G.player.edu=v;G.player.schoolTier=EDU_OPTIONS.find(o=>o.value===v)?.tier||'C';render()}
  else if(a==='setMajor'){G.player.major=v;render()}
  else if(a==='toggleJob'){
    const js=G.player.jobTargets
    G.player.jobTargets=js.includes(v)?js.filter(x=>x!==v):[...js,v];render()
  }
  else if(a==='toggleCity'){
    const cs=G.player.cities
    G.player.cities=cs.includes(v)?cs.filter(x=>x!==v):[...cs,v];render()
  }
  else if(a==='toggleBg'){
    const bs=G.player.backgrounds
    G.player.backgrounds=bs.includes(v)?bs.filter(x=>x!==v):[...bs,v];render()
  }
  else if(a==='prev'){G.step--;render()}
  else if(a==='next'){
    const p=G.player
    const ok=[,!!p.edu,!!p.major,p.jobTargets.length>0,p.cities.length>0,true][G.step]
    if(!ok)return
    if(G.step<5){G.step++;render()}else{ G.page='resume'; render() }
  }
  else if(a==='toggleMobileAttrs'){G.showMobileAttrs=!G.showMobileAttrs;render()}
  else if(a==='choose')makeChoice(parseInt(i))
  else if(a==='resume-start')startGame()
  else if(a==='restart')resetGame()
  else if(a==='share'){ openShareModal() }
  else if(a==='btn-start'){
    showStatsIntro(()=>{ G.page='create'; render() })
  }
}

// ═══════════════════════════════════════════════
// 游戏流程
// ═══════════════════════════════════════════════

function startGame(){
  const p=G.player
  if(p.cities?.includes('hometown')) p._initFlags=['chosen_hometown']
  G.state={
    chapter:1, chapterProgress:0, player:p,
    attributes:getInitialAttributes(p),
    flags:new Set(p._initFlags||[]),
    triggeredEventIds:new Set(),
    currentEvent:null,
  }
  G.eventHistory=[]; G.selectedIdx=null; G.showOptions=false
  G.isTyping=false; G.showMobileAttrs=false; G._aiEndingResult=null
  G.lastChoiceCtx=null
  G.chapterEventsLeft = ([0,3,4,4,3,3][1] || 3) - 1  // 第1章事件数 - 1（第一个事件先生成）
  clearInterval(G.typingTimer)
  render()

  // 双轨并行：开场动画 + 生成第一个事件
  let firstEvent = null
  let introDone  = false

  function tryStartGame() {
    if (!introDone || firstEvent === null) return
    G.eventQueue = firstEvent ? [firstEvent] : [getFallbackEvent(1)]
    G.page = 'game'
    loadNext()
  }

  generateSingleEvent(G.state, null).then(ev => {
    firstEvent = ev || getFallbackEvent(1)
    if (introDone) tryStartGame()
  })

  showIntroAnimation(() => {
    introDone = true
    if (firstEvent === null) { G.page='loading'; render() }
    tryStartGame()
  })
}

function loadNext(){
  if(!G.eventQueue.length){
    if(G.state.chapter>=5){endGame();return}
    doChapterTransition();return
  }
  G.state.currentEvent=G.eventQueue.shift()
  G.state.triggeredEventIds.add(G.state.currentEvent.id)
  G.selectedIdx=null;G.showOptions=false;G.typedLen=0;G.isTyping=true
  render()
  startTyping()
}

function startTyping(){
  const ev=G.state.currentEvent
  if(!ev)return
  const len=ev.desc.length
  let cur=0
  // 优化：加快打字机效果的速度。字数越长打得越快，减少玩家看完内容还在等的情况
  const spd=Math.max(8,Math.min(20,len/80))
  G.typingTimer=setInterval(()=>{
    cur+=3 // 每次多跳过几个字符，加快整体展现速度
    if(cur>=len){cur=len;clearInterval(G.typingTimer);G.isTyping=false;updateDesc();setTimeout(()=>{G.showOptions=true;render()},150);return}
    G.typedLen=cur;updateDesc()
  },spd)
}

function updateDesc(){
  const el=document.getElementById('event-desc')
  if(!el||!G.state.currentEvent)return
  el.innerHTML=esc(G.state.currentEvent.desc.slice(0,G.typedLen))+(G.isTyping?'<span class="cursor">▋</span>':'')
}

function skipType(){
  if(!G.isTyping||!G.state.currentEvent)return
  clearInterval(G.typingTimer)
  G.typedLen=G.state.currentEvent.desc.length
  G.isTyping=false;G.showOptions=true;render()
}

function makeChoice(idx){
  if(G.selectedIdx!==null)return
  const ev=G.state.currentEvent
  if(!ev)return
  const opt=ev.options[idx]
  if(!opt)return
  G.selectedIdx=idx
  G.state.attributes=applyFx(G.state.attributes,opt.effect)
  if(opt.unlockFlag)G.state.flags.add(opt.unlockFlag)
  G.eventHistory.push({event:ev,choiceIdx:idx})
  G.state.chapterProgress++
  // 记录本次选择上下文，供下一个事件生成使用
  G.lastChoiceCtx = { eventTitle: ev.title, choiceText: opt.text }
  render()
  setTimeout(()=>{
    G.selectedIdx=null
    // 本章还有事件要生成 → 立即触发下一个事件的 AI 生成
    if(G.chapterEventsLeft > 0){
      G.chapterEventsLeft--
      G.page='game'
      G.state.currentEvent=null  // 显示 loading 态
      render()
      const ctx=G.lastChoiceCtx
      const st=G.state
      generateSingleEvent(st, ctx).then(nextEv=>{
        G.eventQueue=[nextEv || getFallbackEvent(st.chapter)]
        loadNext()
      })
    } else {
      loadNext()
    }
  },550)
}

// ── 章节过渡与静默预加载 ──
function doChapterTransition(){
  const next = G.state.chapter + 1
  if (next > 5) { endGame(); return }

  G.state.chapter = next
  G.state.chapterProgress = 0
  G.lastChoiceCtx = null
  G.chapterEventsLeft = ([0,3,4,4,3,3][next] || 3) - 1

  const overlay = document.createElement('div')
  overlay.className = 'chapter-overlay'
  overlay.innerHTML = `<div class="ch-label">${CHAPTER_MONTHS[next]}</div><div class="ch-title">${CHAPTER_NAMES[next]}</div><div class="ch-line"></div>`
  document.body.appendChild(overlay)

  let overlayDone = false
  let firstEvent  = null

  function tryProceed() {
    if (!overlayDone || firstEvent === null) return
    G.eventQueue = [firstEvent]
    G.page = 'game'
    loadNext()
  }

  // 优化：在动画开始时立刻触发 AI 生成，并行进行，掩盖网络延迟
  generateSingleEvent(G.state, null).then(ev => {
    firstEvent = ev || getFallbackEvent(next)
    tryProceed()
  })

  // 优化：将动画阻断时间从 2200ms 缩短为 1500ms
  setTimeout(() => {
    overlay.remove()
    overlayDone = true
    if (firstEvent === null) { G.page='loading'; render() }
    tryProceed()
  }, 1500)
}

function endGame(){
  G.ending=determineEnding(G.state)
  G.storyTyped=''
  G._aiEndingResult=null
  G.page='ending'
  render()

  function startStoryTypewriter(story){
    let idx=0
    const t=setInterval(()=>{
      idx+=3;if(idx>=story.length){idx=story.length;clearInterval(t)}
      G.storyTyped=story.slice(0,idx)
      const el=document.getElementById('story-text')
      if(el)el.innerHTML=esc(G.storyTyped)
      if(idx>=story.length)render()
    },22)
  }

  // 先尝试 AI 生成，超时则用静态文案
  generateAiEndingStory(G.ending, G.state).then(result=>{
    const ed=ENDINGS_DATA[G.ending]||ENDINGS_DATA.E3
    if(result){
      G._aiEndingResult=result
      startStoryTypewriter(result.story)
    } else {
      startStoryTypewriter(ENDING_STORIES[G.ending]||ENDING_STORIES.E3)
    }
  })
}

function resetGame(){
  clearInterval(G.typingTimer)
  G={page:'index',step:1,
    player:{edu:null,schoolTier:null,major:null,jobTargets:[],cities:[],backgrounds:[]},
    state:null,eventQueue:[],eventHistory:[],
    selectedIdx:null,showOptions:false,isTyping:false,
    typedLen:0,typingTimer:null,showMobileAttrs:false,
    ending:null,storyTyped:'',_aiEndingResult:null}
  render()
}

// 启动
render()
</script>
